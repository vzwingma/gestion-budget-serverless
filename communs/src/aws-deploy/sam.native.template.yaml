AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Application Budget - AWS Serverless Quarkus backends

Parameters:
  Env:
    Type: String
    Description: Environnement de déploiement (ex. QUA, PROD)
  Version:
    Type: String
    Description: Version applicative déployée (ex. SNAPSHOT ou tag de release)
  DatabaseUrl:
    Type: String
    Description: URL de connexion MongoDB (sans les paramètres de suffixe)
    NoEcho: true
  DatabaseName:
    Type: String
    Description: Nom de la base MongoDB
  AppConfigUrlIhm:
    Type: String
    Description: URL de configuration exposée à l'IHM
  AppConfigUrlBackends:
    Type: String
    Description: URL de configuration utilisée entre backends
  OidcJwtIdAppUserContent:
    Type: String
    Description: Identifiant JWT OIDC pour AppUserContent
    NoEcho: true
  QuarkusLogLevel:
    Type: String
    Description: Niveau de log Quarkus
    Default: INFO
  MongodbLogLevel:
    Type: String
    Description: Niveau de log MongoDB
    Default: INFO

Globals:
  Api:
    EndpointConfiguration: REGIONAL
    BinaryMediaTypes:
      - "*/*"
  Function:
    Timeout: 15
    Environment:
      Variables:
        DISABLE_SIGNAL_HANDLERS: true
        QUARKUS_MONGODB_CONNECTION_STRING: !Sub "${DatabaseUrl}&ssl=true&authSource=admin&retryWrites=true&w=majority"
        QUARKUS_MONGODB_DATABASE: !Ref DatabaseName
        APP_CONFIG_URL_IHM: !Ref AppConfigUrlIhm
        OIDC_JWT_ID_APPUSERCONTENT: !Ref OidcJwtIdAppUserContent
        QUARKUS_LOG_LEVEL: !Ref QuarkusLogLevel
        MONGODB_LOG_LEVEL: !Ref MongodbLogLevel

Resources:
  ParametragesNative:
    Type: AWS::Serverless::Function
    Properties:
      Handler: not.used.in.provided.runtime
      Runtime: provided.al2023
      CodeUri: parametrages/function.zip
      Description: !Sub "µService Paramétrages ${Env} - ${Version}"
      MemorySize: 256
      Policies: AWSLambdaBasicExecutionRole
      Events:
        GetResource:
          Type: Api
          Properties:
            Path: /parametres/v2/{uri+}
            Method: any

  UtilisateursNative:
    Type: AWS::Serverless::Function
    Properties:
      Handler: not.used.in.provided.runtime
      Runtime: provided.al2023
      CodeUri: utilisateurs/function.zip
      Description: !Sub "µService Utilisateurs ${Env} - ${Version}"
      MemorySize: 256
      Policies: AWSLambdaBasicExecutionRole
      Events:
        GetResource:
          Type: Api
          Properties:
            Path: /utilisateurs/v2/{uri+}
            Method: any


  ComptesNative:
    Type: AWS::Serverless::Function
    Properties:
      Handler: not.used.in.provided.runtime
      Runtime: provided.al2023
      CodeUri: comptes/function.zip
      Description: !Sub "µService Comptes ${Env} - ${Version}"
      MemorySize: 256
      Policies: AWSLambdaBasicExecutionRole
      Events:
        GetResource:
          Type: Api
          Properties:
            Path: /comptes/v2/{uri+}
            Method: any


  OperationsNative:
    Type: AWS::Serverless::Function
    Properties:
      Handler: not.used.in.provided.runtime
      Runtime: provided.al2023
      CodeUri: operations/function.zip
      Description: !Sub "µService Opérations ${Env} - ${Version}"
      MemorySize: 256
      Policies: AWSLambdaBasicExecutionRole
      Environment:
        Variables:
          APP_CONFIG_URL_BACKENDS: !Ref AppConfigUrlBackends
      Events:
        GetResource:
          Type: Api
          Properties:
            Path: /budgets/v2/{uri+}
            Method: any

Outputs:
  ParametragesNativeApi:
    Description: URL for Parametrages API
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${Env}/parametres'
    Export:
      Name: !Sub 'ParametragesNative${Env}'
  UtilisateursNativeApi:
    Description: URL for Utilisateurs API
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${Env}/utilisateurs'
    Export:
      Name: !Sub 'UtilisateursNative${Env}'
  ComptesNativeApi:
    Description: URL for Comptes API
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${Env}/comptes'
    Export:
      Name: !Sub 'ComptesNative${Env}'
  OperationsNativeApi:
    Description: URL for Budgets & Opérations API
    Value: !Sub 'https://${ServerlessRestApi}.execute-api.${AWS::Region}.amazonaws.com/${Env}/budgets'
    Export:
      Name: !Sub 'OperationsNative${Env}'

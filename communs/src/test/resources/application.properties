# Configuration de test du module communs.
#
# quarkus.mongodb.database : requis par le driver Panache MongoDB dès qu'une entité @MongoEntity
# (ex. MigrationRecord) est interrogée, que le nom de base soit fourni explicitement ou déduit d'une
# connexion réelle. Sans cette propriété, le démarrage de @QuarkusTest échoue avec
# "The database attribute was not set for the @MongoEntity annotation [...]" avant même de tenter
# une connexion MongoDB (Dev Services ou non).
#
# quarkus.mongodb.connection-string volontairement absent : en son absence, Quarkus MongoDB Dev
# Services démarre automatiquement un conteneur MongoDB jetable pour la durée des tests (nécessite
# Docker/Podman disponible sur la machine exécutant les tests — voir TestMigrationRepository).
quarkus.mongodb.database=communs-test
